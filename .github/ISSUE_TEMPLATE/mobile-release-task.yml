name: Mobile Release Task
description: Android QA, signing, Play Console, or mobile-only release work.
title: "[mobile] "
labels:
  - platform:mobile
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the mobile release or QA work required.
      placeholder: Replace the Capacitor template instrumented test with package-aware smoke coverage.
    validations:
      required: true
  - type: dropdown
    id: target_track
    attributes:
      label: Google Play target
      options:
        - internal
        - closed
        - production
        - n/a
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define the emulator or Play Console outcomes required to close the issue.
      placeholder: |
        - Debug APK installs on CI emulator.
        - Signed release AAB uploads to the internal track.
        - Smoke artifacts include screenshot, logcat, and focus report.
    validations:
      required: true
